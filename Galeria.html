<style>

body{
    background:#f5f5f5;
    font-family:'Poppins', sans-serif;
}

/* TITULO */
.titulo{
    text-align:center;
    font-size:3rem;
    margin:50px 0 30px;
    color:#333;
}

/* GRID */
.galeria-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px;
}

/* TARJETAS */
.foto{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    transition:.3s;
    position:relative;
    cursor:pointer;
}

.foto:hover{
    transform:translateY(-8px);
}

/* IMAGEN */
.foto img{
    width:100%;
    height:200px;
    object-fit:cover;
    transition:.3s;
}

/* EFECTO HOVER */
.foto:hover img{
    transform:scale(1.1);
}

/* TEXTO */
.foto h3{
    padding:10px;
    text-align:center;
    color:#333;
    font-size:1.1rem;
}

/* BOTÓN VOLVER */
.btn-flotante-volver{
    position:fixed;
    top:20px;
    left:20px;
    width:50px;
    height:50px;
    background:#ff5c8d;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    font-size:20px;
    text-decoration:none;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    transition:.3s;
    z-index:999;
}

.btn-flotante-volver:hover{
    transform:scale(1.1);
    background:#e84370;
}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

.lightbox.show{
    display:flex;
}

</style>

    <img id="lightbox-img">

<script>
const fotos = document.querySelectorAll(".foto img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

fotos.forEach(img => {
    img.addEventListener("click", () => {
        lightbox.classList.add("show");
        lightboxImg.src = img.src;
    });
});

lightbox.addEventListener("click", () => {
    lightbox.classList.remove("show");
});
</script>
